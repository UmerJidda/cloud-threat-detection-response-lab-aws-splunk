# coverage_reporting.conf
# Splunk saved searches for COVERAGE REPORTING AND METRICS
# Purpose: compute and report detection coverage metrics against the ATT&CK framework
# Source data: detection_catalog.csv lookup + cdet_alerts index
# Last updated: 2026-06-18

# ── WEEKLY COVERAGE SUMMARY ────────────────────────────────────────────────────

[CDET-CoverageReport-Weekly]
description = Weekly detection coverage summary — active vs testing detections per tactic with coverage percentage
search = | inputlookup detection_catalog.csv \
  | stats count as total_detections, \
          count(eval(status="active")) as active_detections, \
          count(eval(status="testing")) as testing_detections \
    by tactic \
  | eval coverage_pct=round((active_detections/total_detections)*100,1)
cron_schedule = 0 7 * * 1
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 1
is_visible = true

# ── ATT&CK TECHNIQUE COVERAGE ──────────────────────────────────────────────────

[CDET-ATTACKTechniquesCovered]
description = Count distinct ATT&CK techniques with at least one active detection and compute overall framework coverage percentage
search = | inputlookup detection_catalog.csv \
  | where status="active" \
  | dedup technique \
  | stats count as techniques_covered \
  | eval total_techniques_in_scope=14 \
  | eval attack_coverage_pct=round((techniques_covered/total_techniques_in_scope)*100,1)
cron_schedule = 0 7 * * 1
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 1
is_visible = true

# ── DATA SOURCE COVERAGE ───────────────────────────────────────────────────────

[CDET-DataSourceCoverage]
description = Data sources with at least one detection — ranked by number of detections using each source
search = | inputlookup detection_catalog.csv \
  | mvexpand data_sources \
  | stats dc(id) as detections_using_source by data_sources \
  | rename data_sources as data_source \
  | sort -detections_using_source
cron_schedule = 0 7 * * 1
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 1
is_visible = true

# ── TACTIC COVERAGE BREAKDOWN ─────────────────────────────────────────────────

[CDET-TacticCoverageBreakdown]
description = Active detections per tactic — cross-tabulates tactic and status to show coverage distribution across the ATT&CK matrix
search = | inputlookup detection_catalog.csv \
  | stats count as total by tactic, status \
  | eval label=tactic+" ("+status+")" \
  | sort tactic status
cron_schedule = 0 7 * * 1
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 1
is_visible = true

# ── COVERAGE GAP ANALYSIS ──────────────────────────────────────────────────────

[CDET-CoverageGapAnalysis]
description = Identifies ATT&CK tactics with zero active detections — surfaces blind spots in the detection portfolio
search = | inputlookup detection_catalog.csv \
  | where status="active" \
  | stats dc(id) as active_count by tactic \
  | appendcols [| inputlookup detection_catalog.csv | stats dc(tactic) as all_tactics] \
  | search active_count=0 OR isnull(active_count) \
  | table tactic active_count
cron_schedule = 0 7 * * 1
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 1
is_visible = true

# ── MONTHLY EXECUTIVE SUMMARY ──────────────────────────────────────────────────

[CDET-MonthlyExecutiveSummary]
description = High-level coverage metric rollup for monthly reporting — total detections, active count, testing count, coverage percentage, and detections that fired in the last 30 days
search = | inputlookup detection_catalog.csv \
  | stats count as total_defined, \
          count(eval(status="active")) as active, \
          count(eval(status="testing")) as in_testing \
  | eval detection_coverage_pct=round((active/total_defined)*100,1) \
  | append [search index=cdet_alerts earliest=-30d \
      | stats dc(detection_id) as detections_fired] \
  | table total_defined active in_testing detection_coverage_pct detections_fired
cron_schedule = 0 8 1 * *
dispatch.earliest_time = -30d
dispatch.latest_time = now
enableSched = 1
is_visible = true
