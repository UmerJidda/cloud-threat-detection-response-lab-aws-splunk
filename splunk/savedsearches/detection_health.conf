# detection_health.conf
# Splunk saved searches for DETECTION HEALTH MONITORING
# Purpose: ongoing monitoring of detection health — not dashboards, not detection firing
# Runs on a schedule to surface degraded or broken detections before analysts notice
# Last updated: 2026-06-18

# ── ALERT VOLUME MONITORING ────────────────────────────────────────────────────

[CDET-HealthCheck-AlertVolume]
description = Monitor alert volume per detection over last 24h. Flags if any detection has ZERO alerts (may indicate broken detection) or >1000 alerts (may indicate FP storm).
search = search index=cdet_alerts earliest=-24h \
  | stats count as alert_count by detection_id \
  | eval health = case( \
      alert_count = 0, "NO_ALERTS", \
      alert_count > 1000, "HIGH_VOLUME", \
      true(), "NORMAL" \
    ) \
  | table detection_id alert_count health \
  | sort -alert_count
cron_schedule = 0 8 * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1

# ── FALSE POSITIVE RATE MONITORING ────────────────────────────────────────────

[CDET-HealthCheck-FalsePositiveRate]
description = Calculate FP rate per detection over last 7 days. A detection is flagged as FP if analyst disposition=false_positive. Surfaces detections with FP rate >5%.
search = search index=cdet_alerts earliest=-7d \
  | stats count as total_alerts, \
          count(eval(disposition="false_positive")) as fp_count \
    by detection_id \
  | eval fp_rate = round((fp_count / total_alerts) * 100, 1) \
  | where fp_rate > 5 \
  | table detection_id total_alerts fp_count fp_rate \
  | sort -fp_rate
cron_schedule = 0 8 * * *
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 1

# ── STALE DETECTION MONITORING ─────────────────────────────────────────────────

[CDET-HealthCheck-StaleDetections]
description = Detections with no alerts in last 30 days — may indicate data source failure or broken query.
search = | inputlookup detection_catalog.csv \
  | where status="active" \
  | join type=left detection_id [ \
      search index=cdet_alerts earliest=-30d \
      | stats count by detection_id \
    ] \
  | where isnull(count) OR count = 0 \
  | table id name status tactic
cron_schedule = 0 9 * * 1
dispatch.earliest_time = -30d
dispatch.latest_time = now
enableSched = 1

# ── LOOKUP TABLE HEALTH ────────────────────────────────────────────────────────

[CDET-HealthCheck-MissingLookups]
description = Check whether required lookup CSVs exist and are non-empty. Alerts if any lookup row count is zero.
search = | inputlookup approved_iam_principals.csv \
  | stats count as count \
  | eval lookup="approved_iam_principals" \
| append [ \
    | inputlookup automation_role_arns.csv \
    | stats count \
    | eval lookup="automation_role_arns" \
  ] \
| append [ \
    | inputlookup admin_policy_arns.csv \
    | stats count \
    | eval lookup="admin_policy_arns" \
  ] \
| table lookup count \
| where count = 0
cron_schedule = 0 8 * * 1
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 1

# ── DATA INGESTION HEALTH ──────────────────────────────────────────────────────

[CDET-HealthCheck-DataSourceIngestion]
description = Verify CloudTrail events are arriving in the last hour. Alerts if event count drops below 10 (ingestion gap).
search = search index=aws_cloudtrail earliest=-1h \
  | stats count as events_last_hour \
  | eval ingestion_health = if(events_last_hour < 10, "DEGRADED", "NORMAL") \
  | table events_last_hour ingestion_health
cron_schedule = */15 * * * *
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 1

# ── SCHEDULE COMPLIANCE ────────────────────────────────────────────────────────

[CDET-HealthCheck-ScheduleCompliance]
description = Count detections that have fired in the last scheduled window (15min). Useful for confirming scheduled searches are running.
search = search index=cdet_alerts earliest=-15m \
  | stats dc(detection_id) as detections_active \
  | eval total_active_detections = 14 \
  | eval schedule_compliance_pct = round((detections_active / total_active_detections) * 100, 1) \
  | table detections_active total_active_detections schedule_compliance_pct
cron_schedule = */15 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1

# ── PERMISSION DEGRADATION DETECTION ──────────────────────────────────────────

[CDET-HealthCheck-ErrorEvents]
description = Identify AccessDenied or other error events from detection principals — may indicate permission degradation affecting detection infrastructure.
search = search index=aws_cloudtrail errorCode=AccessDenied \
    (userIdentity.arn=*DeploymentPipeline* OR userIdentity.arn=*TerraformExecution*) \
    earliest=-4h \
  | stats count by userIdentity.arn errorCode eventName \
  | sort -count
cron_schedule = 0 */4 * * *
dispatch.earliest_time = -4h
dispatch.latest_time = now
enableSched = 1
