# detection_validation.conf
# Splunk saved searches for DETECTION VALIDATION
# Purpose: verify detections fire correctly on known-positive and known-negative test data
# Index: aws_cloudtrail_test (validation test index, separate from production)
# Last updated: 2026-06-18

# ── POSITIVE VALIDATION: CDET-001 ─────────────────────────────────────────────

[CDET-ValidatePositive-001]
description = Positive validation: CDET-001 IAM user creation by non-approved principal. Runs against validation_positive test data. Expected result: >= 1 event.
search = search eventName=CreateUser eventSource="iam.amazonaws.com" index=aws_cloudtrail_test source=validation_positive* \
  | lookup approved_iam_principals creator_arn OUTPUT approved \
  | lookup automation_role_arns session_issuer_arn OUTPUT automation_approved \
  | where isnull(approved) AND isnull(automation_approved) \
  | table _time eventName creator_arn new_user_name region
cron_schedule = 0 6 * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
action.email.useNSSubject = 1

# ── NEGATIVE VALIDATION: CDET-001 ─────────────────────────────────────────────

[CDET-ValidateNegative-001]
description = Negative validation: CDET-001 must NOT fire on approved pipeline principals. Runs against negative test data. Expected result: 0 events.
search = search eventName=CreateUser eventSource="iam.amazonaws.com" index=aws_cloudtrail_test source=validation_negative* \
  | lookup approved_iam_principals creator_arn OUTPUT approved \
  | lookup automation_role_arns session_issuer_arn OUTPUT automation_approved \
  | where isnull(approved) AND isnull(automation_approved) \
  | table _time eventName creator_arn new_user_name region
cron_schedule = 0 6 * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
action.email.useNSSubject = 1

# ── POSITIVE VALIDATION: CDET-003 ─────────────────────────────────────────────

[CDET-ValidatePositive-003]
description = Positive validation: CDET-003 CloudTrail disabled detection fires on StopLogging or DeleteTrail. Expected result: >= 1 event.
search = search index=aws_cloudtrail_test eventSource="cloudtrail.amazonaws.com" (eventName="StopLogging" OR eventName="DeleteTrail") \
  | table _time eventName trail_arn actor_arn region
cron_schedule = 0 6 * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
action.email.useNSSubject = 1

# ── POSITIVE VALIDATION: CDET-006 ─────────────────────────────────────────────

[CDET-ValidatePositive-006]
description = Positive validation: CDET-006 Root account activity detection fires on Root userIdentity type. Expected result: >= 1 event.
search = search index=aws_cloudtrail_test "userIdentity.type"=Root \
  | table _time eventName root_arn event_source_ip region
cron_schedule = 0 6 * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
action.email.useNSSubject = 1

# ── POSITIVE VALIDATION: CDET-010 ─────────────────────────────────────────────

[CDET-ValidatePositive-010]
description = Positive validation: CDET-010 mass S3 deletion detection fires when objects_deleted >= 50. Expected result: >= 1 event.
search = search index=aws_cloudtrail_test eventName=DeleteObjects eventSource="s3.amazonaws.com" \
  | stats count as objects_deleted by _time actor_arn bucket_name \
  | where objects_deleted >= 50
cron_schedule = 0 6 * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
action.email.useNSSubject = 1

# ── FIELD COVERAGE CHECK ───────────────────────────────────────────────────────

[CDET-FieldCoverageCheck]
description = Field coverage check: surfaces alerts with one or more required output fields missing (detection_id, severity, tactic, technique). Runs daily against last 24h of alerts.
search = search index=cdet_alerts earliest=-24h \
  | eval missing_fields=mvappend( \
      if(isnull(detection_id),"detection_id",null()), \
      if(isnull(severity),"severity",null()), \
      if(isnull(tactic),"tactic",null()), \
      if(isnull(technique),"technique",null()) \
    ) \
  | where isnotnull(missing_fields) \
  | stats count by detection_id missing_fields
cron_schedule = 0 8 * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
action.email.useNSSubject = 1

# ── VALIDATION RUN SUMMARY ─────────────────────────────────────────────────────

[CDET-ValidationRunSummary]
description = Summarizes the most recent validation run: total tests, passed, failed, and pass rate percentage. Returns the single most recent run_id.
search = search index=cdet_validation_results \
  | stats count as total_tests, \
          count(eval(result="PASS")) as passed, \
          count(eval(result="FAIL")) as failed \
    by run_id \
  | eval pass_rate=round((passed/total_tests)*100,1) \
  | sort -run_id \
  | head 1
cron_schedule = 0 9 * * 1
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 1
action.email.useNSSubject = 1
