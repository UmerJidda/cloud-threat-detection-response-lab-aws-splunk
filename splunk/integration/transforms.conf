# transforms.conf
# Splunk lookup table definitions and field extraction transforms for Cloud Threat Detection Lab
# Purpose: register all CSV lookup tables from splunk/lookups/ so detection SPL can reference them
# Also defines regex-based field extractions for nested JSON structures not handled by KV_MODE=json
# Last updated: 2026-06-18

# ── LOOKUP TABLE DEFINITIONS ──────────────────────────────────────────────────

# Approved IAM principals — service accounts and roles permitted to create/modify IAM resources
# Key field: arn | Output fields: approved, description, environment
[approved_iam_principals]
filename = approved_iam_principals.csv
case_sensitive_match = false

# Automation role ARNs — CI/CD and infrastructure pipeline roles exempt from certain detections
# Key field: session_issuer_arn | Output fields: automation_approved, pipeline_name
[automation_role_arns]
filename = automation_role_arns.csv

# Admin policy ARNs — AWS managed and customer-managed policies that grant administrative access
# Key field: policy_arn | Output fields: is_admin_policy, policy_name
[admin_policy_arns]
filename = admin_policy_arns.csv

# Approved AWS accounts — account IDs permitted to appear as sources in cross-account events
# Key field: account_id | Output fields: account_name, environment, owner
[approved_aws_accounts]
filename = approved_aws_accounts.csv

# Approved CIDR ranges — internal and trusted external IP ranges for allowlisting
# Key field: cidr | Output fields: range_name, environment, owner
[approved_cidr_ranges]
filename = approved_cidr_ranges.csv

# Suspicious instance types — EC2 instance types associated with crypto-mining or exfil workloads
# Key field: instance_type | Output fields: risk_reason, risk_score
[suspicious_instance_types]
filename = suspicious_instance_types.csv

# Approved AWS regions — regions where workloads are expected to run; API calls in other regions are flagged
# Key field: region | Output fields: approved, geo_location
[approved_regions]
filename = approved_regions.csv

# CloudTrail log buckets — S3 buckets designated for CloudTrail storage; access/modification is high-fidelity
# Key field: bucket_name | Output fields: trail_name, account_id, retention_days
[cloudtrail_log_buckets]
filename = cloudtrail_log_buckets.csv

# Detection catalog — master list of all CDET detections, generated from detections/ YAML files
# Key field: id | Output fields: name, tactic, technique, severity, status, data_sources
# NOTE: detection_catalog.csv must be generated from the YAML files in detections/ before this
#       lookup is usable. Run: python scripts/generate_detection_catalog.py (or equivalent)
[detection_catalog]
filename = detection_catalog.csv

# ── FIELD EXTRACTION TRANSFORMS ───────────────────────────────────────────────

# Extract userIdentity.type from the raw CloudTrail userIdentity JSON blob.
# KV_MODE=json promotes top-level fields automatically, but nested object keys inside
# userIdentity are not always promoted when the event arrives as a flat NDJSON line.
# This REPORT- stanza targets the userIdentity sub-object and extracts the type value
# as identity_type for use in detection SPL (e.g. | where identity_type="Root").
[extract_cloudtrail_identity_type]
SOURCE_KEY = userIdentity
REGEX = "type"\s*:\s*"([^"]+)"
FORMAT = identity_type::$1
