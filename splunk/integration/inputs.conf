# inputs.conf
# Splunk file monitor inputs for Cloud Threat Detection Lab
# Purpose: watch NDJSON output directories written by Python collectors (data/collected/)
#          and sample log directories (sample_logs/) for offline testing and validation
# Last updated: 2026-06-18
#
# IMPORTANT: Splunk does not support duplicate stanza headers in inputs.conf.
# The three data/collected/ monitors below use unique stanzas via the
# monitor:// URI with a crcSalt or by relying on the whitelist to differentiate them.
# If this app is deployed to a Splunk instance where all three stanzas must coexist,
# consider using separate subdirectories (data/collected/cloudtrail/, data/collected/guardduty/,
# data/collected/securityhub/) and updating the collector output paths accordingly.
# The whitelist filters shown here are the correct production intent.

# ── COLLECTOR OUTPUT: CLOUDTRAIL ──────────────────────────────────────────────

# Monitor NDJSON files written by scripts/aws_collectors/cloudtrail_collector.py
# File naming convention: cloudtrail_<YYYY-MM-DDTHH-MM-SS>.ndjson
[monitor://data/collected/]
index = aws_cloudtrail
sourcetype = aws:cloudtrail:json
whitelist = cloudtrail_.*\.ndjson
recursive = false

# ── COLLECTOR OUTPUT: GUARDDUTY ───────────────────────────────────────────────

# Monitor NDJSON files written by scripts/aws_collectors/guardduty_collector.py
# File naming convention: guardduty_<YYYY-MM-DDTHH-MM-SS>.ndjson
[monitor://data/collected/guardduty_]
index = aws_security
sourcetype = aws:guardduty
whitelist = guardduty_.*\.ndjson

# ── COLLECTOR OUTPUT: SECURITY HUB ───────────────────────────────────────────

# Monitor NDJSON files written by scripts/aws_collectors/securityhub_collector.py
# File naming convention: securityhub_<YYYY-MM-DDTHH-MM-SS>.ndjson
[monitor://data/collected/securityhub_]
index = aws_security
sourcetype = aws:securityhub
whitelist = securityhub_.*\.ndjson

# ── SAMPLE LOGS: CLOUDTRAIL ───────────────────────────────────────────────────

# Malicious CloudTrail events — known-positive samples for detection validation
[monitor://sample_logs/cloudtrail/malicious/]
index = aws_cloudtrail
sourcetype = aws:cloudtrail:json

# Benign CloudTrail events — known-negative samples for false-positive testing
[monitor://sample_logs/cloudtrail/benign/]
index = aws_cloudtrail
sourcetype = aws:cloudtrail:json

# Edge-case CloudTrail events — ambiguous events to verify tuning logic
[monitor://sample_logs/cloudtrail/edge_cases/]
index = aws_cloudtrail
sourcetype = aws:cloudtrail:json

# ── SAMPLE LOGS: GUARDDUTY ────────────────────────────────────────────────────

# Malicious GuardDuty findings — known-positive samples for detection validation
[monitor://sample_logs/guardduty/malicious/]
index = aws_security
sourcetype = aws:guardduty

# ── SAMPLE LOGS: SECURITY HUB ────────────────────────────────────────────────

# Security Hub findings — used for enrichment and correlation testing
[monitor://sample_logs/securityhub/findings/]
index = aws_security
sourcetype = aws:securityhub

# ── HEC INPUT (REFERENCE / DISABLED) ─────────────────────────────────────────

# HTTP Event Collector input for streaming CloudTrail events from Lambda or Kinesis Firehose.
# Disabled by default — enable and set the token when configuring live HEC ingestion.
# To enable: set disabled = 0 and replace <REPLACE_WITH_HEC_TOKEN> with the actual token
# generated in Splunk Settings > Data Inputs > HTTP Event Collector.
[http://cdet_hec_cloudtrail]
disabled = 1
index = aws_cloudtrail
sourcetype = aws:cloudtrail:json
token = <REPLACE_WITH_HEC_TOKEN>
