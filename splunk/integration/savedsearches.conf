# savedsearches.conf
# Splunk saved searches for INTEGRATION TESTING AND PIPELINE VERIFICATION
# Purpose: verify the end-to-end data pipeline is functioning correctly —
#          ingestion, field extraction, lookup availability, enrichment, and detection firing.
# These searches are run ON-DEMAND (enableSched = 0), not on a schedule.
# For ongoing health monitoring use splunk/savedsearches/detection_health.conf.
# For detection correctness use splunk/savedsearches/detection_validation.conf.
# Last updated: 2026-06-18

# ── CLOUDTRAIL INGEST VERIFICATION ────────────────────────────────────────────

[CDET-Integration-CloudTrailIngest-Verify]
description = Verify CloudTrail events are arriving from the Python collectors with the expected sourcetype (aws:cloudtrail:json) and basic field structure. A non-empty result confirms data/collected/ is being monitored and NDJSON lines are parsed correctly. Run after deploying or restarting the collector.
search = index=aws_cloudtrail sourcetype="aws:cloudtrail:json" earliest=-1h \
  | stats count by sourcetype source \
  | where count > 0
cron_schedule = 0 * * * *
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 0

# ── LOOKUP SYNC CHECK ─────────────────────────────────────────────────────────

[CDET-Integration-LookupSync-Check]
description = Confirm all eight required lookup tables are loaded in Splunk and contain at least one row. A count of zero for any lookup means the CSV is missing or empty — detection SPL that references that lookup will silently produce no matches. Run after any lookup refresh or initial deployment.
search = | inputlookup approved_iam_principals.csv \
  | stats count \
  | eval lookup="approved_iam_principals" \
| append [ \
    | inputlookup automation_role_arns.csv \
    | stats count \
    | eval lookup="automation_role_arns" \
  ] \
| append [ \
    | inputlookup admin_policy_arns.csv \
    | stats count \
    | eval lookup="admin_policy_arns" \
  ] \
| append [ \
    | inputlookup approved_aws_accounts.csv \
    | stats count \
    | eval lookup="approved_aws_accounts" \
  ] \
| append [ \
    | inputlookup approved_cidr_ranges.csv \
    | stats count \
    | eval lookup="approved_cidr_ranges" \
  ] \
| append [ \
    | inputlookup suspicious_instance_types.csv \
    | stats count \
    | eval lookup="suspicious_instance_types" \
  ] \
| append [ \
    | inputlookup approved_regions.csv \
    | stats count \
    | eval lookup="approved_regions" \
  ] \
| append [ \
    | inputlookup cloudtrail_log_buckets.csv \
    | stats count \
    | eval lookup="cloudtrail_log_buckets" \
  ] \
| table lookup count \
| eval status=if(count > 0, "OK", "EMPTY — RELOAD REQUIRED") \
| sort lookup
cron_schedule = 0 8 * * 1
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 0

# ── END-TO-END PIPELINE SMOKE TEST ────────────────────────────────────────────

[CDET-Integration-E2E-PipelineTest]
description = End-to-end pipeline smoke test. Procedure: (1) Use scripts/inject_test_event.py (or manually copy sample_logs/cloudtrail/malicious/cdet001_positive_01.json to data/collected/ as cloudtrail_smoketest.ndjson). (2) Wait up to 2 minutes for Splunk to index the file. (3) Run this search — it looks for the injected event in aws_cloudtrail and confirms the detection_id field is populated in cdet_alerts. A result with event_count >= 1 AND alert_count >= 1 confirms the full pipeline: collector output -> Splunk index -> detection SPL -> alert index. If event_count >= 1 but alert_count = 0 the detection query is broken. If event_count = 0 the monitor input or props.conf is broken.
search = search index=aws_cloudtrail sourcetype="aws:cloudtrail:json" source="*smoketest*" earliest=-5m \
  | stats count as event_count \
  | appendcols [ \
      search index=cdet_alerts detection_id=* earliest=-5m \
      | stats dc(detection_id) as alert_count \
    ] \
  | eval pipeline_status=case( \
      event_count >= 1 AND alert_count >= 1, "PASS — events indexed and detection fired", \
      event_count >= 1 AND alert_count = 0, "PARTIAL — events indexed but no detection alert", \
      event_count = 0, "FAIL — no events indexed; check monitor input and props.conf", \
      true(), "UNKNOWN" \
    ) \
  | table event_count alert_count pipeline_status
cron_schedule = */5 * * * *
dispatch.earliest_time = -5m
dispatch.latest_time = now
enableSched = 0

# ── ALERT ENRICHMENT VERIFICATION ────────────────────────────────────────────

[CDET-Integration-AlertEnrichment-Verify]
description = Verify that alerts written to the cdet_alerts index in the last 24 hours carry all four required enrichment fields: detection_id, attack_tactic, attack_technique, enriched_severity. Missing fields indicate the enrichment step in the detection SPL or post-processing script is incomplete. Returns one row per alert with its missing fields listed.
search = index=cdet_alerts earliest=-24h \
  | eval missing=mvappend( \
      if(isnull(detection_id) OR detection_id="",   "detection_id",      null()), \
      if(isnull(attack_tactic) OR attack_tactic="", "attack_tactic",     null()), \
      if(isnull(attack_technique) OR attack_technique="", "attack_technique", null()), \
      if(isnull(enriched_severity) OR enriched_severity="", "enriched_severity", null()) \
    ) \
  | where isnotnull(missing) \
  | stats count as alert_count, values(missing) as missing_fields by detection_id \
  | sort -alert_count
cron_schedule = 0 8 * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 0

# ── DETECTION PIPELINE DAILY SUMMARY ─────────────────────────────────────────

[CDET-Integration-DetectionPipeline-Summary]
description = Daily summary of the full detection pipeline over the last 24 hours: total CloudTrail events ingested, total detection alerts fired, distinct CDETs that fired, and alert count per detection. Provides a single-pane-of-glass view of pipeline throughput for daily operational review.
search = search index=aws_cloudtrail sourcetype="aws:cloudtrail:json" earliest=-24h \
  | stats count as events_ingested \
  | appendcols [ \
      search index=cdet_alerts earliest=-24h \
      | stats count as total_alerts, dc(detection_id) as detections_fired \
    ] \
  | eval pipeline_summary="Ingested: "+tostring(events_ingested)+" events | Alerts: "+tostring(total_alerts)+" | CDETs fired: "+tostring(detections_fired) \
  | table events_ingested total_alerts detections_fired pipeline_summary \
| append [ \
    search index=cdet_alerts earliest=-24h \
    | stats count as alert_count by detection_id \
    | sort -alert_count \
  ]
cron_schedule = 0 7 * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 0

# ── SAMPLE DATA DETECTION COVERAGE VALIDATE ──────────────────────────────────

[CDET-Integration-SampleData-Validate]
description = Validate that all 14 known-positive sample NDJSON files in sample_logs/cloudtrail/malicious/ produce at least one detection alert. Searches aws_cloudtrail for events sourced from the malicious sample directory and checks that at least 14 distinct detection_id values appear in cdet_alerts. A result where detections_fired < 14 means one or more detections are not firing on their corresponding sample event — investigate which detection_id values are absent by comparing against detection_catalog.csv.
search = index=aws_cloudtrail source="sample_logs/cloudtrail/malicious/*" earliest=-7d \
  | stats count as sample_events_indexed \
  | appendcols [ \
      search index=cdet_alerts earliest=-7d \
      | search [ \
          search index=aws_cloudtrail source="sample_logs/cloudtrail/malicious/*" earliest=-7d \
          | fields _time \
        ] \
      | stats dc(detection_id) as detections_fired \
    ] \
  | eval coverage_status=if(detections_fired >= 14, \
      "PASS — all 14 sample positives produced detections", \
      "FAIL — only "+tostring(detections_fired)+"/14 detections fired; check missing CDETs") \
  | table sample_events_indexed detections_fired coverage_status
cron_schedule = 0 6 * * 1
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 0
