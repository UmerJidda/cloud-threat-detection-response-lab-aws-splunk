# props.conf
# Splunk sourcetype definitions for Cloud Threat Detection Lab
# Purpose: normalize NDJSON outputs from Python collectors into Splunk CIM-compatible fields
# Sourcetypes: aws:cloudtrail:json, aws:guardduty, aws:securityhub, aws:cdet:alert
# Last updated: 2026-06-18

# ── CLOUDTRAIL ─────────────────────────────────────────────────────────────────

[aws:cloudtrail:json]
# NDJSON — each line is a self-contained JSON event; never merge lines
SHOULD_LINEMERGE = false
# Timestamp extraction from the eventTime field
TIME_PREFIX = "eventTime":
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
MAX_TIMESTAMP_LOOKAHEAD = 30
# Parse all top-level keys as fields automatically
KV_MODE = json
# Splunk CIM categorisation
category = Cloud
pulldown_type = 1

# CIM field aliases — normalize CloudTrail field names to Splunk CIM equivalents
# action (CIM: change action performed)
FIELDALIAS-action = eventName AS action
# src_ip (CIM: source IP of the API call)
FIELDALIAS-src_ip = sourceIPAddress AS src_ip
# region (CIM: AWS region where the event occurred)
FIELDALIAS-region = awsRegion AS region
# user (CIM: identity ARN of the caller)
FIELDALIAS-user = userIdentity.arn AS user
# vendor_account (CIM: AWS account ID of the caller)
FIELDALIAS-vendor_account = userIdentity.accountId AS vendor_account
# user_type (CIM: IAM identity type — IAMUser, AssumedRole, Root, etc.)
FIELDALIAS-user_type = userIdentity.type AS user_type
# dest (CIM: AWS service endpoint targeted by the API call)
FIELDALIAS-dest = eventSource AS dest
# error_code (CIM: API error code when the call fails)
FIELDALIAS-error_code = errorCode AS error_code
# error_message (CIM: human-readable error message when the call fails)
FIELDALIAS-error_message = errorMessage AS error_message

# ── GUARDDUTY ──────────────────────────────────────────────────────────────────

[aws:guardduty]
# NDJSON — one finding per line
SHOULD_LINEMERGE = false
# Timestamp from the updatedAt field (ISO-8601 UTC)
TIME_PREFIX = "updatedAt":
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
KV_MODE = json

# CIM field aliases — normalize GuardDuty finding fields
# signature (CIM: detection rule or finding type name)
FIELDALIAS-signature = type AS signature
# severity_id (CIM: numeric severity score from GuardDuty)
FIELDALIAS-severity_id = severity AS severity_id
# event_id (CIM: unique finding identifier)
FIELDALIAS-event_id = id AS event_id

# ── SECURITY HUB ──────────────────────────────────────────────────────────────

[aws:securityhub]
# NDJSON — one finding per line
SHOULD_LINEMERGE = false
# Timestamp from the CreatedAt field (ISO-8601 with milliseconds)
TIME_PREFIX = "CreatedAt":
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
KV_MODE = json

# CIM field aliases — normalize Security Hub ASFF finding fields
# signature (CIM: finding title from ASFF)
FIELDALIAS-signature = Title AS signature
# severity (CIM: severity label — CRITICAL, HIGH, MEDIUM, LOW, INFORMATIONAL)
FIELDALIAS-severity = Severity.Label AS severity
# event_id (CIM: unique finding ARN / ID)
FIELDALIAS-event_id = Id AS event_id

# ── CDET ALERT OUTPUT ─────────────────────────────────────────────────────────

[aws:cdet:alert]
# NDJSON — one alert record per line, written by detection SPL or Python enrichment
SHOULD_LINEMERGE = false
# Timestamp from the _time field (Splunk epoch or ISO-8601 written by collectors)
TIME_PREFIX = "_time":
KV_MODE = json
